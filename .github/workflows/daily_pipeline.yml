name: Daily Data Pipeline

on:
  schedule:
    - cron: '14 13 * * *'  # Every day at 1:14pm UTC
  workflow_dispatch:       # Lets you trigger it manually from GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-cloud-bigquery db-dtypes pandas faker numpy

      - name: Authenticate to Google Cloud
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json" >> $GITHUB_ENV

      - name: Run daily pipeline
        run: python 03_generate_daily.py --project promo-roi-engine
